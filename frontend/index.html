<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/assets/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vitthal Photo Frames - Premium photo frames celebrating Indian heritage. Explore our divine deities and warrior collections.">
    <meta name="theme-color" content="#1a2332" />
    <title>Vitthal Photo Frames | Premium Heritage Frames</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://checkout.razorpay.com" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" crossorigin="anonymous">
    <!-- Razorpay Checkout Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js" async></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Check if Razorpay loaded -->
    <script>
      window.addEventListener('load', () => {
        if (window.Razorpay) {
          console.log('✅ Razorpay script loaded successfully');
        } else {
          console.error('❌ Razorpay script failed to load');
        }
      });
      // Fallback check after a delay
      setTimeout(() => {
        if (window.Razorpay) {
          console.log('✅ Razorpay ready for checkout');
        }
      }, 2000);
    </script>
  </body>
</html>
