<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful - Vitthal Photo Frames</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .success-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: #e8f5e8;
            color: #2cae66;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }

            to {
                transform: scale(1);
            }
        }

        .order-id {
            background: #fdf2e9;
            color: #fa873b;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 700;
            display: inline-block;
            margin: 20px 0;
            font-size: 1.1rem;
        }

        .message-p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-success-page {
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-primary-success {
            background: #fa873b;
            color: white;
        }

        .btn-primary-success:hover {
            background: #e67e2f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(250, 135, 59, 0.3);
        }

        .btn-secondary-success {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary-success:hover {
            background: #eee;
        }

        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1001;
        }
    </style>
</head>

<body style="background: #faf9f9;">
    <!-- Confetti canvas could go here -->

    <div class="success-container">
        <div class="success-icon">
            <i class="bi bi-check-lg"></i>
        </div>
        <h1 style="font-size: 2.5rem; color: #333; margin-bottom: 10px;">Jai Maharashtra!</h1>
        <h2 style="font-size: 1.5rem; color: #555;">Order Placed Successfully</h2>

        <div class="order-id" id="display-order-id">Order ID: #Loading...</div>

        <p class="message-p">
            Thank you for your devotion! Your Hanuman/Warrior frame is being prepared with pure intentions. You will
            receive an email confirmation shortly.
        </p>

        <div class="btn-group">
            <a href="index.html" class="btn-success-page btn-secondary-success">Continue Shopping</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('id');
            const displayId = document.getElementById('display-order-id');

            if (orderId) {
                displayId.textContent = `Order ID: #${orderId.substring(0, 10)}`;
            } else {
                displayId.style.display = 'none';
            }
        });
    </script>
</body>

</html>
